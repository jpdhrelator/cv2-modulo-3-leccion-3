<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniShop - Integrador Sass</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sass/main.css">
</head>
<body>
  <header class="header">
    <span class="header__logo">MiniShop</span>
    <ul class="header__nav">
      <li><a href="#" class="header__link">Inicio</a></li>
      <li><a href="#" class="header__link">Productos</a></li>
      <li><a href="#" class="header__link">Carrito</a></li>
    </ul>
  </header>

  <main class="contenedor">
    <h1>Productos destacados</h1>
    <div class="grid">

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Audífonos Pro</h3>
          <p class="card__precio">$59.990</p>
          <span class="badge badge--nuevo">Nuevo</span>
          <button class="boton">Agregar</button>
        </div>
      </article>

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Teclado Mecánico</h3>
          <p class="card__precio">$44.990</p>
          <span class="badge badge--oferta">Oferta</span>
          <button class="boton">Agregar</button>
        </div>
      </article>

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Mouse Gamer</h3>
          <p class="card__precio">$24.990</p>
          <span class="badge badge--agotado">Agotado</span>
          <button class="boton boton--acento">Avisar</button>
        </div>
      </article>

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Webcam HD</h3>
          <p class="card__precio">$34.990</p>
          <span class="badge badge--nuevo">Nuevo</span>
          <button class="boton">Agregar</button>
        </div>
      </article>

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Monitor 24"</h3>
          <p class="card__precio">$129.990</p>
          <span class="badge badge--oferta">Oferta</span>
          <button class="boton">Agregar</button>
        </div>
      </article>

      <article class="card">
        <div class="card__img"></div>
        <div class="card__cuerpo">
          <h3 class="card__titulo">Silla Ergonómica</h3>
          <p class="card__precio">$89.990</p>
          <span class="badge badge--nuevo">Nuevo</span>
          <button class="boton">Agregar</button>
        </div>
      </article>

    </div>
  </main>
</body>
</html>
